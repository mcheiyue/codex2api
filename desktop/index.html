<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex2API Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero-card">
        <div class="badge">Windows 桌面版</div>
        <h1>Codex2API 正在启动本地服务</h1>
        <p id="summary" class="summary">
          桌面壳会自动拉起 <code>codex2api.exe</code>，待健康检查通过后直接进入管理后台。
        </p>

        <div class="status-board">
          <div class="status-pill" id="status-pill" data-level="pending">
            <span class="dot"></span>
            <span id="status-label">准备启动</span>
          </div>
          <div class="spinner" aria-hidden="true"></div>
        </div>

        <dl class="meta-grid">
          <div>
            <dt>服务地址</dt>
            <dd id="admin-url">http://127.0.0.1:8080/admin/</dd>
          </div>
          <div>
            <dt>运行目录</dt>
            <dd id="runtime-dir">等待初始化…</dd>
          </div>
          <div>
            <dt>日志文件</dt>
            <dd id="log-path">等待初始化…</dd>
          </div>
          <div>
            <dt>当前阶段</dt>
            <dd id="phase">初始化中</dd>
          </div>
        </dl>

        <div class="timeline" id="timeline">
          <article class="timeline-item is-active">
            <span class="timeline-step">1</span>
            <div>
              <strong>准备桌面运行环境</strong>
              <p>自动生成 SQLite + 内存缓存的默认配置，并创建本地数据目录。</p>
            </div>
          </article>
        </div>

        <footer class="hint-strip">
          关闭窗口只会隐藏到系统托盘；请通过托盘菜单中的“退出”彻底关闭服务。
        </footer>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
  </html>
